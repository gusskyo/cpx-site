<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPX Lavagem</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 450px;
  background: #050505;
  border: 1px solid #ff0077;
  padding: 30px;
  box-shadow: 0 0 25px #ff0077;
  text-align: center;
}

h1 {
  color: #ff0077;
  font-size: 3rem;
  letter-spacing: 4px;
  text-shadow: 0 0 15px #ff0077;
  margin-bottom: 20px;
}

input[type="number"] {
  width: 100%;
  padding: 12px;
  background: #000;
  border: 1px solid #ff0077;
  color: #fff;
  margin-bottom: 20px;
  outline: none;
}

.parceria-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0a0a0a;
  border: 1px solid #ff0077;
  padding: 12px;
  margin-bottom: 20px;
  box-shadow: 0 0 10px #ff0077;
  cursor: pointer;
}

.parceria-box span {
  color: #ff0077;
  font-size: 0.8rem;
}

.switch {
  position: relative;
  width: 50px;
  height: 25px;
}

.switch input {
  position: absolute;
  width: 100%;
  height: 100%;
  cursor: pointer;
  opacity: 0;
  margin: 0;
}

.slider {
  position: absolute;
  background: #111;
  width: 100%;
  height: 100%;
  border: 1px solid #ff0077;
  transition: .3s;
}

.slider:before {
  content: "";
  position: absolute;
  width: 18px;
  height: 18px;
  left: 3px;
  top: 3px;
  background: #ff0077;
  transition: .3s;
}

.switch input:checked + .slider {
  background: #ff0077;
}

.switch input:checked + .slider:before {
  transform: translateX(24px);
  background: black;
}

button {
  width: 100%;
  padding: 12px;
  background: #000;
  border: 1px solid #ff0077;
  color: #ff0077;
  cursor: pointer;
  box-shadow: 0 0 10px #ff0077;
}

button:hover {
  background: #ff0077;
  color: black;
}

.result {
  display: none;
  margin-top: 20px;
  text-align: left;
}

.card {
  background: #0a0a0a;
  border: 1px solid #ff0077;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 0 10px #ff0077;
}

.card span {
  font-size: 0.7rem;
  color: #999;
  display: block;
  margin-bottom: 6px;
}

.card strong {
  color: #ff0077;
  font-size: 1.1rem;
  display: block;
  margin-top: 4px;
}

.modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #050505;
  border: 1px solid #ff0077;
  padding: 20px;
  box-shadow: 0 0 20px #ff0077;
  text-align: center;
}

.modal-content p {
  color: #ff0077;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">
  <h1>CPX</h1>

  <div id="form">
    <input type="number" id="valor" placeholder="VALOR TOTAL A SER LAVADO">

    <label class="parceria-box">
      <span>PARCERIA ATIVA</span>
      <div class="switch">
        <input type="checkbox" id="parceria">
        <span class="slider"></span>
      </div>
    </label>

    <button onclick="calcular()">CALCULAR</button>
  </div>

  <div class="result" id="resultado">
    <div id="cards"></div>
    <button onclick="resetar()">VOLTAR</button>
  </div>
</div>

<div class="modal" id="erroModal">
  <div class="modal-content">
    <p>Digite um valor válido</p>
    <button onclick="fecharErro()">OK</button>
  </div>
</div>

<script>
function formatar(v) {
  return `R$ ${v.toFixed(2)}`;
}

function abrirErro() {
  document.getElementById("erroModal").style.display = "flex";
}

function fecharErro() {
  document.getElementById("erroModal").style.display = "none";
}

function calcular() {
  let valor = parseFloat(document.getElementById('valor').value);
  let parceria = document.getElementById('parceria').checked;

  if (!valor || valor <= 0) {
    abrirErro();
    return;
  }

  let limpo = valor * 0.9;

  // RECIBOS
  let blocos = Math.ceil(valor / 100000);
  let recibos = blocos * 30;

  let html = '';

  html += `<div class="card"><span>VALOR TOTAL LAVADO</span><strong>${formatar(valor)}</strong></div>`;
  html += `<div class="card"><span>VALOR LIMPO RECEBIDO</span><strong>${formatar(limpo)}</strong></div>`;
  html += `<div class="card"><span>RECIBOS NECESSÁRIOS</span><strong>${recibos}</strong></div>`;

  if (parceria) {
    let parceiros = limpo * 0.8;
    let cpx = limpo * 0.2;

    html += `<div class="card"><span>VALOR DEVOLVIDO PARA PARCEIROS</span><strong>${formatar(parceiros)}</strong></div>`;
    html += `<div class="card"><span>VALOR LIMPO DA CPX</span><strong>${formatar(cpx)}</strong></div>`;
  } else {
    let pista = limpo * 0.65;
    let cpx = limpo * 0.35;

    html += `<div class="card"><span>VALOR DEVOLVIDO PARA PISTA</span><strong>${formatar(pista)}</strong></div>`;
    html += `<div class="card"><span>VALOR LIMPO DA CPX</span><strong>${formatar(cpx)}</strong></div>`;
  }

  document.getElementById('cards').innerHTML = html;
  document.getElementById('form').style.display = 'none';
  document.getElementById('resultado').style.display = 'block';
}

function resetar() {
  document.getElementById('valor').value = '';
  document.getElementById('parceria').checked = false;
  document.getElementById('form').style.display = 'block';
  document.getElementById('resultado').style.display = 'none';
}
</script>

</body>
</html>
