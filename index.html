<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOUR7 CALCULADORA</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 2;
  width: 90%;
  max-width: 450px;
  background: #050505;
  border: 1px solid #ff003c;
  padding: 30px;
  box-shadow: 0 0 25px #ff003c;
  text-align: center;
}

h1 {
  color: #ff003c;
  font-size: 3rem;
  letter-spacing: 4px;
  text-shadow: 0 0 15px #ff003c;
  margin-bottom: 20px;
}

input {
  width: 100%;
  height: 50px;
  padding: 0 12px;
  background: #000;
  border: 1px solid #ff003c;
  color: #fff;
  margin-bottom: 15px;
  box-sizing: border-box;
}

.parceria-box {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #0a0a0a;
  border: 1px solid #ff003c;
  height: 50px; /* mesma altura do input */
  padding: 0 12px;
  margin-bottom: 20px;
  box-sizing: border-box;
}

.switch {
  position: relative;
  width: 50px;
  height: 25px;
}

.switch input {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}

.slider {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 1px solid #ff003c;
}

.slider:before {
  content: "";
  position: absolute;
  width: 18px;
  height: 18px;
  left: 3px;
  top: 3px;
  background: #ff003c;
  transition: .3s;
}

.switch input:checked + .slider:before {
  transform: translateX(24px);
}

button {
  width: 100%;
  padding: 12px;
  background: #000;
  border: 1px solid #ff003c;
  color: #ff003c;
  cursor: pointer;
  box-shadow: 0 0 10px #ff003c;
}

button:hover {
  background: #ff003c;
  color: black;
}

.result {
  display: none;
  margin-top: 20px;
  text-align: left;
}

.card {
  background: #0a0a0a;
  border: 1px solid #ff003c;
  padding: 12px;
  margin-bottom: 10px;
  box-shadow: 0 0 10px #ff003c;
}

.card span {
  font-size: 0.7rem;
  color: #999;
  display: block;
}

.card strong {
  color: #ff003c;
}

.loading {
  display: none;
  margin-top: 20px;
  color: #ff003c;
  text-align: center;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

.modal {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #050505;
  border: 1px solid #ff003c;
  padding: 20px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
  <h1>FOUR7</h1>

  <div id="form">
    <input type="number" id="valor" placeholder="VALOR TOTAL A SER LAVADO">

    <label class="parceria-box">
      <span>PARCERIA ATIVA</span>
      <div class="switch">
        <input type="checkbox" id="parceria">
        <span class="slider"></span>
      </div>
    </label>

    <button onclick="calcular()">CALCULAR</button>
  </div>

  <div class="loading" id="loading">PROCESSANDO SISTEMA...</div>

  <div class="result" id="resultado">
    <div id="cards"></div>
    <button onclick="resetar()">VOLTAR</button>
  </div>
</div>

<div class="modal" id="erroModal">
  <div class="modal-content">
    <p>Digite um valor válido</p>
    <button onclick="fecharErro()">OK</button>
  </div>
</div>

<script>
const valorInput = document.getElementById('valor');
const parceriaInput = document.getElementById('parceria');
const form = document.getElementById('form');
const resultado = document.getElementById('resultado');
const cards = document.getElementById('cards');
const loading = document.getElementById('loading');
const erroModal = document.getElementById('erroModal');

function formatar(v){
  return "R$ " + v.toFixed(2);
}

function calcular(){
  let valor = parseFloat(valorInput.value);
  let parceria = parceriaInput.checked;

  if(!valor || valor <= 0){
    erroModal.style.display = "flex";
    return;
  }

  form.style.display = "none";
  loading.style.display = "block";

  setTimeout(() => {

    let cliente = parceria ? valor * 0.7 : valor * 0.5;
    let four7 = parceria ? valor * 0.2 : valor * 0.4;

    let blocos = Math.ceil(valor / 100000);
    let recibos = blocos * 30;

    let html = `
      <div class="card"><span>RECIBOS NECESSÁRIOS</span><strong>${recibos}</strong></div>
      <div class="card"><span>VALOR TOTAL LAVADO</span><strong>${formatar(valor)}</strong></div>
      <div class="card"><span>VALOR DEVOLVIDO PARA CLIENTE</span><strong>${formatar(cliente)}</strong></div>
      <div class="card"><span>VALOR DA FOUR7</span><strong>${formatar(four7)}</strong></div>
    `;

    cards.innerHTML = html;
    loading.style.display = "none";
    resultado.style.display = "block";

  }, 600);
}

function resetar(){
  valorInput.value = "";
  parceriaInput.checked = false;
  form.style.display = "block";
  resultado.style.display = "none";
}

function fecharErro(){
  erroModal.style.display = "none";
}

/* PARTICULAS COM LINHAS */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    vx:(Math.random()-0.5)*0.5,
    vy:(Math.random()-0.5)*0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="#ff003c";
    ctx.fill();

    for(let j=i+1;j<particles.length;j++){
      let p2 = particles[j];
      let dx = p.x - p2.x;
      let dy = p.y - p2.y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 120){
        ctx.strokeStyle = "rgba(255,0,60,"+(1-dist/120)+")";
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);
        ctx.lineTo(p2.x,p2.y);
        ctx.stroke();
      }
    }

    p.x+=p.vx;
    p.y+=p.vy;

    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
