<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPX Lavagem</title>

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #1a0010, #000);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #ff008c55;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 40px #ff008c33;
      text-align: center;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      color: #ff008c;
      font-size: 4rem;
      margin-bottom: 10px;
      letter-spacing: 3px;
      text-shadow: 0 0 15px #ff008c;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      border: none;
      border-radius: 10px;
      outline: none;
      margin-bottom: 15px;
      background: #111;
      color: #fff;
      border: 1px solid #ff008c44;
    }

    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #ff4db8;
      background: #0a0a0a;
      padding: 10px 15px;
      border-radius: 10px;
      border: 1px solid #ff008c33;
      box-shadow: 0 0 10px #ff008c22;
    }

    /* Toggle Switch */
    .switch {
      position: relative;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #222;
      border-radius: 30px;
      transition: 0.3s;
      box-shadow: inset 0 0 5px #000;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    .switch input:checked + .slider {
      background-color: #ff008c;
      box-shadow: 0 0 10px #ff008c;
    }

    .switch input:checked + .slider:before {
      transform: translateX(24px);
    }

    button {
      padding: 15px 30px;
      border: none;
      border-radius: 10px;
      background: #ff008c;
      color: white;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 1px;
      transition: 0.3s;
      box-shadow: 0 0 10px #ff008c;
    }

    button:hover {
      background: #ff4db8;
      box-shadow: 0 0 20px #ff008c;
    }

    .result {
      display: none;
      margin-top: 20px;
      text-align: left;
    }

    .card {
      background: #0a0a0a;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      border-left: 4px solid #ff008c;
      box-shadow: 0 0 10px #ff008c22;
    }

    .card span {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
    }

    .card strong {
      font-size: 1.2rem;
      color: #ff008c;
    }

    .back {
      margin-top: 15px;
      width: 100%;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>CPX</h1>

  <div id="form">
    <input type="number" id="valor" placeholder="VALOR TOTAL A SER LAVADO">

    <label>
      <span>PARCERIA ATIVA</span>
      <div class="switch">
        <input type="checkbox" id="parceria">
        <span class="slider"></span>
      </div>
    </label>

    <button onclick="calcular()">CALCULAR</button>
  </div>

  <div class="result" id="resultado">
    <div id="cards"></div>
    <button class="back" onclick="resetar()">FECHAR</button>
  </div>
</div>

<script>
function formatar(v) {
  return `R$ ${v.toFixed(2)}`;
}

function calcular() {
  let valor = parseFloat(document.getElementById('valor').value);
  let parceria = document.getElementById('parceria').checked;

  if (!valor) return alert('Digite um valor válido');

  let limpo = valor * 0.9;
  let html = '';

  html += `<div class="card"><span>VALOR TOTAL LAVADO</span><strong>${formatar(valor)}</strong></div>`;
  html += `<div class="card"><span>VALOR LIMPO RECEBIDO</span><strong>${formatar(limpo)}</strong></div>`;

  if (parceria) {
    let parceiros = limpo * 0.8;
    let cpx = limpo * 0.2;

    html += `<div class="card"><span>VALOR DEVOLVIDO PARA PARCEIROS</span><strong>${formatar(parceiros)}</strong></div>`;
    html += `<div class="card"><span>VALOR LIMPO DA CPX</span><strong>${formatar(cpx)}</strong></div>`;
  } else {
    let pista = limpo * 0.65;
    let cpx = limpo * 0.35;

    html += `<div class="card"><span>VALOR DEVOLVIDO PARA PISTA</span><strong>${formatar(pista)}</strong></div>`;
    html += `<div class="card"><span>VALOR LIMPO DA CPX</span><strong>${formatar(cpx)}</strong></div>`;
  }

  document.getElementById('cards').innerHTML = html;

  document.getElementById('form').style.display = 'none';
  document.getElementById('resultado').style.display = 'block';
}

function resetar() {
  document.getElementById('valor').value = '';
  document.getElementById('parceria').checked = false;
  document.getElementById('form').style.display = 'block';
  document.getElementById('resultado').style.display = 'none';
}
</script>

</body>
</html>
